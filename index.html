<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Household Budget</title>
  <script src="https://unpkg.com/chart.js"></script>
  <style>
    :root{
      --bg:#f3f4f6;--card:#ffffff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;
      --dark:#0f172a;--dark2:#334155;--soft:#f8fafc;--ok:#dcfce7;--warn:#fef3c7;
      --danger:#fee2e2;--ok-text:#166534;--warn-text:#92400e;--danger-text:#991b1b;
      --shadow:0 10px 30px rgba(15,23,42,.10);--radius:24px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);color:var(--text);}
    button,input,select{font:inherit}
    .app{max-width:1400px;margin:0 auto;padding:16px}
    .phone{background:#fff;border:1px solid var(--border);border-radius:32px;
      box-shadow:0 20px 60px rgba(15,23,42,.12);padding:14px;min-height:100vh;}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px}
    .hamburger{display:none;background:none;border:none;font-size:24px;cursor:pointer;padding:8px;margin:-8px -8px -8px 0}
    .header h1{margin:0;font-size:24px;flex:1}
    .header-info{font-size:12px;color:var(--muted);text-align:right}
    .hero{background:linear-gradient(135deg,var(--dark),var(--dark2));color:#fff;border-radius:26px;
      padding:20px;margin-bottom:20px;}
    .hero h2{margin:6px 0;font-size:24px}
    .hero p{margin:0;color:#cbd5e1;font-size:14px}
    .tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
    .tab-btn{border:none;background:#f8fafc;border-radius:14px;padding:12px;cursor:pointer;font-weight:600;
      border:1px solid var(--border);transition:all .2s}
    .tab-btn.active{background:var(--dark);color:#fff;border-color:var(--dark)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .grid{display:grid;gap:12px}
    .grid-2{grid-template-columns:1fr 1fr}
    .grid-3{grid-template-columns:repeat(3,1fr)}
    .grid-4{grid-template-columns:repeat(4,1fr)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:18px}
    .card.empty{border-color:#dc2626;background:#fee2e2}
    .card.warning{border-color:#f59e0b;background:#fef3c7}
    .kpi-card{padding:20px;background:linear-gradient(135deg,var(--dark),var(--dark2));
      color:#fff;border-radius:20px;text-align:center}
    .kpi-value{font-size:32px;font-weight:700;margin:8px 0}
    .kpi-label{font-size:12px;color:#cbd5e1}
    .section{padding:18px;border-radius:12px;background:var(--card);border:1px solid var(--border)}
    .section h3{margin:0 0 12px 0;font-size:16px;font-weight:600}
    .list{display:grid;gap:12px}
    .item{display:flex;justify-content:space-between;align-items:center;padding:12px;
      border:1px solid var(--border);border-radius:12px;gap:12px}
    .item.urgent{border-color:#dc2626;background:rgba(220,38,38,.05)}
    .item-left{flex:1;display:flex;gap:12px;align-items:center}
    .item-info{flex:1}
    .item-title{font-weight:600;font-size:14px}
    .item-meta{font-size:12px;color:var(--muted);margin-top:4px}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;
      background:#eef2ff;color:#4f46e5;margin-right:4px}
    .badge.urgent{background:#fee2e2;color:#991b1b}
    .badge.market{background:#dbeafe;color:#1e40af}
    .badge.drugstore{background:#dcfce7;color:#166534}
    .input,.select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:12px;
      background:#fff}
    .input:focus,.select:focus{outline:none;border-color:var(--dark)}
    .btn{border:none;background:var(--dark);color:#fff;padding:10px 16px;border-radius:12px;
      cursor:pointer;font-weight:600;transition:background .2s}
    .btn:hover{background:var(--dark2)}
    .btn.secondary{background:#e2e8f0;color:var(--text)}
    .btn.secondary:hover{background:#cbd5e1}
    .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
    .chart-container{position:relative;height:300px;margin-top:16px}
    .summary-row{display:flex;justify-content:space-between;align-items:center;padding:12px;
      border-bottom:1px solid var(--border)}
    .summary-row:last-child{border-bottom:none}
    .summary-label{font-size:14px}
    .summary-value{font-size:14px;font-weight:600}
    .filter-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .chip{padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:#fff;
      cursor:pointer;font-size:12px;transition:all .2s}
    .chip.active{background:var(--dark);color:#fff;border-color:var(--dark)}
    
    @media (max-width:768px){
      .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
      .tabs{grid-template-columns:repeat(3,1fr)}
      .hamburger{display:block}
      .header{flex-wrap:wrap}
      .item{flex-direction:column;align-items:flex-start}
      .kpi-value{font-size:24px}
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const API_URL = "https://script.google.com/macros/s/AKfycbxSWtfZ_7VwomImUy610eqnXZwd8DY3cBLm7wa8DTn7jOA2lDmUbuY0XMH4iMx6lfHE/exec";

    const initialData = {
      teamMembers: ["Yesim", "Alex", "Mina"],
      budget: { total: 500, currency: "EUR", month: new Date().toLocaleString('default', { month: 'long', year: 'numeric' }) },
      shoppingList: [
        { id: 1, title: "Milk", price: 3.99, buyer: "Yesim", category: "market", priority: "normal", done: false, paidBy: null, addedBy: "Alex", date: new Date().toISOString(), isFavorite: false, recurring: false },
        { id: 2, title: "Bread", price: 2.50, buyer: "Mina", category: "market", priority: "urgent", done: false, paidBy: null, addedBy: "Yesim", date: new Date().toISOString(), isFavorite: true, recurring: false },
        { id: 3, title: "Shampoo", price: 8.99, buyer: "Yesim", category: "drugstore", priority: "normal", done: false, paidBy: null, addedBy: "Mina", date: new Date().toISOString(), isFavorite: false, recurring: true }
      ],
      completed: [
        { id: 101, title: "Coffee", price: 5.99, buyer: "Alex", paidBy: "Alex", quantity: 1, date: "2024-03-20", category: "market" },
        { id: 102, title: "Vegetables", price: 12.50, buyer: "Yesim", paidBy: "Alex", quantity: 1, date: "2024-03-20", category: "market" }
      ]
    };

    async function callApi(action, data) {
      try {
        const response = await fetch(`${API_URL}?action=${action}`, {
          method: 'POST',
          body: JSON.stringify(data),
          headers: { 'Content-Type': 'application/json' }
        });
        return await response.json();
      } catch (err) {
        console.error('API error:', err);
        return { success: false };
      }
    }

    function SpendingChart({ data }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        
        const spending = {};
        data.forEach(item => {
          if (item.paidBy) {
            spending[item.paidBy] = (spending[item.paidBy] || 0) + item.price;
          }
        });

        if (chartRef.current) chartRef.current.destroy();

        chartRef.current = new Chart(canvasRef.current, {
          type: 'bar',
          data: {
            labels: Object.keys(spending),
            datasets: [{
              label: 'Total Spent',
              data: Object.values(spending),
              backgroundColor: ['#0f172a', '#334155', '#64748b'],
              borderRadius: 8
            }]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
      }, [data]);

      return <canvas ref={canvasRef}></canvas>;
    }

    function App() {
      const [tab, setTab] = useState('dashboard');
      const [data, setData] = useState(initialData);
      const [filters, setFilters] = useState({ priority: 'all', category: 'all' });
      const [newItem, setNewItem] = useState({ title: '', price: '', buyer: 'Yesim', category: 'market', priority: 'normal' });
      const [filterChip, setFilterChip] = useState('all');

      useEffect(() => {
        // Optionally load from API
        console.log('App initialized');
      }, []);

      const spending = useMemo(() => {
        const totals = {};
        data.completed.forEach(item => {
          if (item.paidBy) totals[item.paidBy] = (totals[item.paidBy] || 0) + item.price;
        });
        return totals;
      }, [data.completed]);

      const remainingBudget = useMemo(() => {
        const spent = Object.values(spending).reduce((a, b) => a + b, 0);
        return data.budget.total - spent;
      }, [spending, data.budget.total]);

      const filteredList = useMemo(() => {
        let list = data.shoppingList;
        if (filterChip === 'urgent') list = list.filter(i => i.priority === 'urgent');
        if (filterChip === 'today') list = list.filter(i => new Date(i.date).toDateString() === new Date().toDateString());
        if (filterChip === 'market') list = list.filter(i => i.category === 'market');
        if (filterChip === 'drugstore') list = list.filter(i => i.category === 'drugstore');
        if (filterChip === 'favorites') list = list.filter(i => i.isFavorite);
        return list.filter(i => !i.done);
      }, [data.shoppingList, filterChip]);

      function addShoppingItem() {
        if (!newItem.title.trim() || !newItem.price) return;
        const item = {
          id: Date.now(),
          title: newItem.title,
          price: parseFloat(newItem.price),
          buyer: newItem.buyer,
          category: newItem.category,
          priority: newItem.priority,
          done: false,
          paidBy: null,
          addedBy: 'Yesim',
          date: new Date().toISOString(),
          isFavorite: false,
          recurring: false
        };
        callApi('addShoppingItem', item).then(() => {
          setData({ ...data, shoppingList: [...data.shoppingList, item] });
          setNewItem({ title: '', price: '', buyer: 'Yesim', category: 'market', priority: 'normal' });
        });
      }

      function completeItem(id, quantity = 1) {
        const item = data.shoppingList.find(i => i.id === id);
        if (!item) return;
        const completed = {
          ...item,
          quantity,
          done: true,
          date: new Date().toISOString(),
          paidBy: item.buyer
        };
        callApi('completeItem', completed).then(() => {
          setData({
            ...data,
            shoppingList: data.shoppingList.filter(i => i.id !== id),
            completed: [completed, ...data.completed]
          });
        });
      }

      function deleteItem(id) {
        callApi('deleteItem', { id }).then(() => {
          setData({ ...data, shoppingList: data.shoppingList.filter(i => i.id !== id) });
        });
      }

      function toggleFavorite(id) {
        setData({
          ...data,
          shoppingList: data.shoppingList.map(i => 
            i.id === id ? { ...i, isFavorite: !i.isFavorite } : i
          )
        });
      }

      return (
        <div className="app">
          <div className="phone">
            <div className="header">
              <button className="hamburger">☰</button>
              <h1>Smart Household</h1>
              <div className="header-info">
                <div>{data.budget.currency} {remainingBudget.toFixed(2)}</div>
                <div style={{fontSize: 10, color: '#6b7280'}}>remaining</div>
              </div>
            </div>

            <div className="hero">
              <h2>Monthly Budget Overview</h2>
              <p>{data.budget.month} • Total: €{data.budget.total}</p>
            </div>

            <div className="tabs">
              {['dashboard', 'shopping', 'history', 'budget', 'members', 'summary'].map(t => (
                <button key={t} className={`tab-btn ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>
                  {t.charAt(0).toUpperCase() + t.slice(1)}
                </button>
              ))}
            </div>

            {tab === 'dashboard' && (
              <div className="tab-panel active">
                <div className="grid grid-4">
                  <div className="kpi-card">
                    <div className="kpi-label">Remaining Budget</div>
                    <div className="kpi-value" style={{color: remainingBudget < 0 ? '#dc2626' : '#10b981'}}>€{remainingBudget.toFixed(2)}</div>
                  </div>
                  <div className="kpi-card">
                    <div className="kpi-label">Total Spent</div>
                    <div className="kpi-value">€{Object.values(spending).reduce((a,b) => a+b, 0).toFixed(2)}</div>
                  </div>
                  <div className="kpi-card">
                    <div className="kpi-label">Open Items</div>
                    <div className="kpi-value">{data.shoppingList.filter(i => !i.done).length}</div>
                  </div>
                  <div className="kpi-card">
                    <div className="kpi-label">Low Stock Items</div>
                    <div className="kpi-value">{Math.max(0, data.shoppingList.filter(i => i.priority === 'urgent').length)}</div>
                  </div>
                </div>

                <div className="grid grid-2" style={{marginTop: 20}}>
                  <div className="section">
                    <h3>Spending by Participant</h3>
                    <div className="chart-container">
                      <SpendingChart data={data.completed} />
                    </div>
                  </div>

                  <div className="section">
                    <h3>Quick Stats</h3>
                    {Object.entries(spending).map(([person, total]) => (
                      <div key={person} className="summary-row">
                        <span className="summary-label">{person}</span>
                        <span className="summary-value">€{total.toFixed(2)}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="section" style={{marginTop: 20}}>
                  <h3>🚨 Urgent Items ({data.shoppingList.filter(i => i.priority === 'urgent').length})</h3>
                  <div className="list">
                    {data.shoppingList.filter(i => i.priority === 'urgent' && !i.done).slice(0, 5).map(item => (
                      <div key={item.id} className="item urgent">
                        <div className="item-left">
                          <div className="item-info">
                            <div className="item-title">{item.title}</div>
                            <div className="item-meta">€{item.price} • {item.buyer}</div>
                          </div>
                        </div>
                        <div>€{item.price}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="section" style={{marginTop: 20}}>
                  <h3>📋 Still Open ({data.shoppingList.filter(i => !i.done).length})</h3>
                  <div className="list" style={{maxHeight: 300, overflowY: 'auto'}}>
                    {data.shoppingList.filter(i => !i.done).slice(0, 10).map(item => (
                      <div key={item.id} className="item">
                        <div className="item-left">
                          <div className="item-info">
                            <div className="item-title">{item.title}</div>
                            <div className="item-meta">€{item.price} • {item.buyer}</div>
                          </div>
                        </div>
                        <div>€{item.price}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {tab === 'shopping' && (
              <div className="tab-panel active">
                <div className="section">
                  <h3>Add New Item</h3>
                  <div className="grid grid-2" style={{gap: 12, marginTop: 12}}>
                    <input className="input" placeholder="Item name" value={newItem.title} onChange={(e) => setNewItem({...newItem, title: e.target.value})} />
                    <input className="input" type="number" placeholder="Price" value={newItem.price} onChange={(e) => setNewItem({...newItem, price: e.target.value})} />
                    <select className="select" value={newItem.buyer} onChange={(e) => setNewItem({...newItem, buyer: e.target.value})}>
                      {data.teamMembers.map(m => <option key={m}>{m}</option>)}
                    </select>
                    <select className="select" value={newItem.category} onChange={(e) => setNewItem({...newItem, category: e.target.value})}>
                      <option value="market">Market</option>
                      <option value="drugstore">Drugstore</option>
                      <option value="other">Other</option>
                    </select>
                    <select className="select" style={{gridColumn: 'span 2'}} value={newItem.priority} onChange={(e) => setNewItem({...newItem, priority: e.target.value})}>
                      <option value="normal">Normal</option>
                      <option value="urgent">Urgent</option>
                      <option value="today">Today</option>
                    </select>
                  </div>
                  <button className="btn" style={{width: '100%', marginTop: 12}} onClick={addShoppingItem}>Add Item</button>
                </div>

                <div className="section" style={{marginTop: 20}}>
                  <h3>Shopping List</h3>
                  <div className="filter-chips">
                    {['all', 'urgent', 'today', 'market', 'drugstore', 'favorites'].map(f => (
                      <button key={f} className={`chip ${filterChip === f ? 'active' : ''}`} onClick={() => setFilterChip(f)}>
                        {f.charAt(0).toUpperCase() + f.slice(1)}
                      </button>
                    ))}
                  </div>
                  <div className="list">
                    {filteredList.map(item => (
                      <div key={item.id} className={`item ${item.priority === 'urgent' ? 'urgent' : ''}`}>
                        <div className="item-left">
                          <input type="checkbox" onChange={() => completeItem(item.id)} />
                          <div className="item-info">
                            <div className="item-title">{item.title}{item.isFavorite ? ' ⭐' : ''}</div>
                            <div style={{display: 'flex', gap: 4, marginTop: 4}}>
                              <span className={`badge ${item.priority === 'urgent' ? 'urgent' : ''}`}>{item.priority}</span>
                              <span className={`badge ${item.category}`}>{item.category}</span>
                              <span className="badge">{item.buyer}</span>
                            </div>
                          </div>
                        </div>
                        <div style={{display: 'flex', gap: 8, alignItems: 'center'}}>
                          <strong>€{item.price}</strong>
                          <button className="btn secondary" style={{padding: '4px 8px', fontSize: 12}} onClick={() => toggleFavorite(item.id)}>⭐</button>
                          <button className="btn secondary" style={{padding: '4px 8px', fontSize: 12}} onClick={() => deleteItem(item.id)}>🗑️</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {tab === 'history' && (
              <div className="tab-panel active">
                <div className="section">
                  <h3>Completed Purchases</h3>
                  <div className="list">
                    {data.completed.map(item => (
                      <div key={item.id} className="item">
                        <div className="item-left">
                          <div className="item-info">
                            <div className="item-title">{item.title}</div>
                            <div className="item-meta">Paid by {item.paidBy} on {new Date(item.date).toLocaleDateString()}</div>
                          </div>
                        </div>
                        <div><strong>€{item.price}</strong></div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {tab === 'budget' && (
              <div className="tab-panel active">
                <div className="section">
                  <h3>Budget Status</h3>
                  <div className="summary-row">
                    <span>Total Budget</span>
                    <span className="summary-value">€{data.budget.total}</span>
                  </div>
                  <div className="summary-row">
                    <span>Total Spent</span>
                    <span className="summary-value">€{Object.values(spending).reduce((a,b) => a+b, 0).toFixed(2)}</span>
                  </div>
                  <div className="summary-row" style={{background: remainingBudget < 0 ? '#fee2e2' : '#dcfce7', borderRadius: 8, padding: 12, marginTop: 12}}>
                    <span style={{fontWeight: 600}}>Remaining</span>
                    <span className="summary-value" style={{color: remainingBudget < 0 ? '#991b1b' : '#166534'}}>€{remainingBudget.toFixed(2)}</span>
                  </div>
                </div>

                <div className="section" style={{marginTop: 20}}>
                  <h3>Spending Breakdown</h3>
                  {Object.entries(spending).map(([person, total]) => (
                    <div key={person} className="summary-row">
                      <span>{person}</span>
                      <span className="summary-value">€{total.toFixed(2)} ({((total / data.budget.total) * 100).toFixed(0)}%)</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {tab === 'members' && (
              <div className="tab-panel active">
                <div className="section">
                  <h3>Team Members</h3>
                  <div className="list">
                    {data.teamMembers.map(member => (
                      <div key={member} className="item">
                        <div className="item-info">
                          <div className="item-title">{member}</div>
                          <div className="item-meta">Spent: €{(spending[member] || 0).toFixed(2)}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {tab === 'summary' && (
              <div className="tab-panel active">
                <div className="section">
                  <h3>Monthly Summary</h3>
                  <div className="summary-row">
                    <span>Month</span>
                    <span className="summary-value">{data.budget.month}</span>
                  </div>
                  <div className="summary-row">
                    <span>Total Budget</span>
                    <span className="summary-value">€{data.budget.total}</span>
                  </div>
                  <div className="summary-row">
                    <span>Total Spent</span>
                    <span className="summary-value">€{Object.values(spending).reduce((a,b) => a+b, 0).toFixed(2)}</span>
                  </div>
                  <div className="summary-row">
                    <span>Completed Items</span>
                    <span className="summary-value">{data.completed.length}</span>
                  </div>
                  <div className="summary-row">
                    <span>Open Items</span>
                    <span className="summary-value">{data.shoppingList.filter(i => !i.done).length}</span>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
