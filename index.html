<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared Shopping List</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --dark:#0f172a;
      --dark2:#334155;
      --soft:#f8fafc;
      --ok:#dcfce7;
      --warn:#fef3c7;
      --danger:#fee2e2;
      --ok-text:#166534;
      --warn-text:#92400e;
      --danger-text:#991b1b;
      --shadow:0 10px 30px rgba(15,23,42,.10);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    button,input,select{font:inherit}
    .app{max-width:1200px;margin:0 auto;padding:16px}
    .phone{
      background:#fff;
      border:1px solid var(--border);
      border-radius:32px;
      box-shadow:0 20px 60px rgba(15,23,42,.12);
      padding:14px;
      min-height:100vh;
    }
    .hero{
      background:linear-gradient(135deg,var(--dark),var(--dark2));
      color:#fff;
      border-radius:26px;
      padding:20px;
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
    }
    .hero h1{margin:6px 0 8px 0;font-size:30px;line-height:1.1}
    .hero p{margin:0}
    .hero .sub{color:#cbd5e1;font-size:14px}
    .badge{
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      white-space:nowrap;
      font-size:12px;
      border:1px solid rgba(255,255,255,.16);
    }
    .grid{display:grid;gap:12px}
    .metrics{grid-template-columns:repeat(4,1fr);margin-top:14px}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .card.empty-item{
      border-color:#dc2626;
      background:#fee2e2;
    }
    .metric{
      padding:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .metric .label{font-size:12px;color:var(--muted)}
    .metric .value{font-size:20px;font-weight:700;margin-top:4px}
    .icon{
      width:40px;height:40px;border-radius:16px;
      display:grid;place-items:center;background:#f1f5f9;font-size:18px;
    }
    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:16px;
    }
    .hamburger{
      display:none;
      background:none;
      border:none;
      font-size:24px;
      cursor:pointer;
      padding:8px;
      margin:-8px -8px -8px 0;
    }
    .hamburger.open{
      color:#111827;
    }
    .mobile-nav{
      display:none;
      position:fixed;
      top:0;
      left:0;
      right:0;
      bottom:0;
      background:rgba(0,0,0,.5);
      z-index:999;
    }
    .mobile-nav.open{
      display:block;
    }
    .mobile-menu{
      position:fixed;
      top:0;
      left:0;
      width:70%;
      max-width:280px;
      height:100vh;
      background:#fff;
      z-index:1000;
      overflow-y:auto;
      padding:16px;
      transform:translateX(-100%);
      transition:transform .3s ease;
    }
    .mobile-menu.open{
      transform:translateX(0);
    }
    .mobile-menu-close{
      background:none;
      border:none;
      font-size:24px;
      cursor:pointer;
      float:right;
      padding:4px 8px;
      margin:-8px -8px 16px 0;
    }
    .mobile-menu-item{
      display:block;
      width:100%;
      border:none;
      background:transparent;
      padding:14px;
      text-align:left;
      cursor:pointer;
      font-size:16px;
      font-weight:500;
      color:var(--text);
      border-radius:12px;
      margin-bottom:8px;
      transition:background .2s;
    }
    .mobile-menu-item:active,.mobile-menu-item:hover{
      background:var(--soft);
    }
    .mobile-menu-item.active{
      background:var(--dark);
      color:#fff;
    }
    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      background:#f8fafc;
      border:1px solid var(--border);
      padding:8px;
      border-radius:20px;
      margin-top:16px;
    }
    .bottom-nav{
      display:none;
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      background:#fff;
      border-top:1px solid var(--border);
      padding:8px;
      z-index:100;
      grid-template-columns:repeat(3,1fr);
      gap:4px;
    }
    .bottom-nav.open{
      display:grid;
    }
    .tab-btn{
      border:none;
      background:transparent;
      border-radius:14px;
      padding:12px;
      font-weight:600;
      cursor:pointer;
    }
    .tab-btn.active{
      background:#fff;
      box-shadow:var(--shadow);
    }
    .bottom-nav .tab-btn{
      padding:10px;
      font-weight:400;
      border-radius:12px;
    }
    .bottom-nav .tab-btn.active{
      background:var(--dark);
      color:#fff;
      box-shadow:none;
    }
    .tab-panel{margin-top:16px;display:none}
    .tab-panel.active{display:block}
    .section{padding:18px}
    .section h3{margin:0 0 4px 0;font-size:16px}
    .section .desc{color:var(--muted);font-size:14px;margin-bottom:14px}
    .list{display:grid;gap:12px}
    .toolbar{
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap
    }
    .btn{
      border:none;background:#111827;color:#fff;padding:12px 16px;border-radius:16px;
      cursor:pointer;font-weight:600
    }
    .btn:hover{background:#1f2937}
    .btn.secondary{background:#e2e8f0;color:#111827}
    .input,.select{
      width:100%;padding:12px 14px;border-radius:16px;border:1px solid var(--border);background:#fff
    }
    .input:focus,.select:focus{outline:none;border-color:#111827}
    .row-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .shopping-item,.upload-item{
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
      padding:14px;border:1px solid var(--border);border-radius:18px
    }
    .shopping-item.empty-highlight{
      border-color:#dc2626;
      background:#fee2e2;
    }
    .shopping-left{display:flex;gap:12px;min-width:0;flex:1}
    .title{font-weight:700}
    .done-text{text-decoration:line-through;color:#94a3b8}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .chip{
      padding:6px 10px;border-radius:999px;font-size:12px;border:1px solid var(--border);background:#fff
    }
    .chip.dark{background:#eef2ff}
    .delete{
      border:none;background:transparent;font-size:18px;cursor:pointer;color:#64748b;padding:0;margin:0
    }
    .delete:hover{color:#dc2626}
    .photo-preview{
      max-width:100px;max-height:100px;border-radius:12px;margin-top:8px;
    }
    .small{font-size:12px;color:var(--muted)}
    .member-badge{
      padding:8px 12px;background:#eef2ff;border-radius:12px;display:flex;justify-content:space-between;align-items:center
    }
    .form-card{padding:16px;border:1px solid var(--border);border-radius:20px;background:#fcfcfd;margin-bottom:14px}
    .quantity-input{width:80px}
    .checkout-form{display:grid;gap:12px;margin-top:12px}
    
    @media (max-width:768px){
      .app{padding:12px}
      .phone{padding:12px;border-radius:24px}
      .hero{padding:16px;flex-direction:column;gap:12px}
      .hero h1{font-size:24px}
      .metrics{grid-template-columns:repeat(2,1fr)}
      .tabs{grid-template-columns:repeat(3,1fr)}
      .tab-btn{padding:10px;font-size:13px}
      .section{padding:14px}
      .row-2{grid-template-columns:1fr}
      .toolbar{flex-direction:column;align-items:stretch}
      .toolbar > .input,.toolbar > .select{width:100%}
      .btn{width:100%;padding:14px}
    }
    
    @media (max-width:480px){
      .app{padding:8px}
      .phone{padding:10px;border-radius:16px;min-height:auto;border:none;box-shadow:none;background:var(--bg);padding-bottom:80px}
      .hamburger{display:block}
      .tabs{display:none}
      .bottom-nav{display:grid}
      .header{margin-bottom:12px}
      .hero{padding:14px;border-radius:18px}
      .hero h1{font-size:20px;margin:4px 0 6px 0}
      .hero p{font-size:12px}
      .badge{font-size:11px;padding:6px 10px}
      .metrics{grid-template-columns:1fr;gap:10px;margin-top:10px}
      .metric{padding:12px}
      .metric .label{font-size:11px}
      .metric .value{font-size:16px}
      .icon{width:36px;height:36px;font-size:16px;border-radius:12px}
      .tab-panel{margin-top:12px}
      .section{padding:12px}
      .section h3{font-size:14px}
      .section .desc{font-size:12px;margin-bottom:10px}
      .shopping-item,.upload-item{
        flex-direction:column;
        gap:10px;
        padding:12px;
      }
      .shopping-left{width:100%}
      .chips{gap:6px}
      .chip{font-size:11px;padding:4px 8px}
      .input,.select{padding:10px 12px;font-size:14px;border-radius:12px}
      .btn{padding:12px;font-size:14px;border-radius:12px;width:100%}
      .btn.secondary{width:auto}
      .small{font-size:11px}
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const API_URL = "https://script.google.com/macros/s/AKfycbxSWtfZ_7VwomImUy610eqnXZwd8DY3cBLm7wa8DTn7jOA2lDmUbuY0XMH4iMx6lfHE/exec";

    const initialData = {
      "teamMembers": ["Yesim", "Alex", "Mina"],
      "items": [
        {"id": 1, "name": "Milk", "price": 1.79, "stock": 1, "minStock": 2, "buyer": "Yesim"},
        {"id": 2, "name": "Bread", "price": 2.50, "stock": 0, "minStock": 1, "buyer": "Alex"},
        {"id": 3, "name": "Eggs", "price": 3.99, "stock": 2, "minStock": 1, "buyer": "Mina"}
      ],
      "shoppingList": [
        {"id": 101, "title": "Milk 2L", "priority": "High", "buyer": "Yesim", "estimatedPrice": 3.58, "done": false, "photo": null, "quantity": 0},
        {"id": 102, "title": "Bread", "priority": "Medium", "buyer": "Mina", "estimatedPrice": 2.50, "done": false, "photo": null, "quantity": 0}
      ]
    };

    function formatCurrency(value) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'EUR',
      }).format(value || 0)
    }

    async function fetchData() {
      try {
        const response = await fetch(`${API_URL}?action=getData`);
        const data = await response.json();
        console.log('Data loaded:', data);
        return data;
      } catch (err) {
        console.error('Fetch error:', err);
        return initialData;
      }
    }

    async function callApi(action, data) {
      try {
        const response = await fetch(`${API_URL}?action=${action}`, {
          method: 'POST',
          body: JSON.stringify(data),
          headers: { 'Content-Type': 'application/json' }
        });
        return await response.json();
      } catch (err) {
        console.error('API error:', err);
      }
    }

    function MetricCard({ label, value, icon }) {
      return (
        <div className="card metric">
          <div>
            <div className="label">{label}</div>
            <div className="value">{value}</div>
          </div>
          <div className="icon">{icon}</div>
        </div>
      )
    }

    function App() {
      const [tab, setTab] = useState('dashboard')
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false)
      const [items, setItems] = useState(initialData.items)
      const [shoppingList, setShoppingList] = useState(initialData.shoppingList)
      const [teamMembers, setTeamMembers] = useState(initialData.teamMembers)
      const [newMember, setNewMember] = useState('')
      const [shoppingFormOpen, setShoppingFormOpen] = useState(false)
      const [checkoutForm, setCheckoutForm] = useState({})
      const [shoppingForm, setShoppingForm] = useState({
        title: '',
        priority: 'Medium',
        buyer: 'Yesim',
        estimatedPrice: '',
        photo: null
      })

      useEffect(() => {
        fetchData().then(data => {
          setItems(data.items || initialData.items);
          setShoppingList(data.shoppingList || initialData.shoppingList);
          setTeamMembers(data.teamMembers || initialData.teamMembers);
        });
      }, []);

      const metrics = useMemo(() => {
        const totalInventoryValue = items.reduce((sum, i) => sum + i.price * i.stock, 0);
        const emptyItems = items.filter(i => i.stock === 0).length;
        const lowStockItems = items.filter(i => i.stock <= i.minStock && i.stock > 0).length;
        const openShoppingValue = shoppingList.filter(i => !i.done).reduce((sum, i) => sum + i.estimatedPrice, 0);
        const completionRate = shoppingList.length
          ? Math.round((shoppingList.filter(i => i.done).length / shoppingList.length) * 100)
          : 0;
        return { totalInventoryValue, emptyItems, lowStockItems, openShoppingValue, completionRate };
      }, [items, shoppingList]);

      function addMember() {
        if (newMember.trim() && !teamMembers.includes(newMember.trim())) {
          setTeamMembers([...teamMembers, newMember.trim()]);
          setNewMember('');
        }
      }

      function removeMember(name) {
        setTeamMembers(teamMembers.filter(m => m !== name));
      }

      function addShoppingItem() {
        if (!shoppingForm.title.trim()) {
          alert('Please enter a title');
          return;
        }
        callApi('addShoppingItem', {
          title: shoppingForm.title.trim(),
          priority: shoppingForm.priority,
          buyer: shoppingForm.buyer,
          estimatedPrice: Number(shoppingForm.estimatedPrice || 0)
        }).then(() => {
          fetchData().then(data => {
            setShoppingList(data.shoppingList || []);
          });
        });
        setShoppingForm({
          title: '',
          priority: 'Medium',
          buyer: 'Yesim',
          estimatedPrice: '',
          photo: null
        });
        setShoppingFormOpen(false);
      }

      function completeShoppingItem(id) {
        const item = shoppingList.find(i => i.id === id);
        if (!item || checkoutForm[id] === undefined) {
          alert('Please enter quantity');
          return;
        }
        const quantity = parseInt(checkoutForm[id]) || 0;
        if (quantity <= 0) {
          alert('Quantity must be greater than 0');
          return;
        }
        const existingItem = items.find(i => i.name === item.title);
        if (existingItem) {
          callApi('updateStock', {
            itemId: existingItem.id,
            quantity: quantity
          }).then(() => {
            setShoppingList(shoppingList.map(i => 
              i.id === id ? { ...i, done: true, quantity: quantity } : i
            ));
            const newCheckoutForm = { ...checkoutForm };
            delete newCheckoutForm[id];
            setCheckoutForm(newCheckoutForm);
            fetchData().then(data => {
              setItems(data.items || []);
              setShoppingList(data.shoppingList || []);
            });
          });
        } else {
          callApi('addInventoryItem', {
            name: item.title,
            price: item.estimatedPrice,
            stock: quantity,
            minStock: 1,
            buyer: item.buyer
          }).then(() => {
            setShoppingList(shoppingList.map(i => 
              i.id === id ? { ...i, done: true, quantity: quantity } : i
            ));
            fetchData().then(data => {
              setItems(data.items || []);
              setShoppingList(data.shoppingList || []);
            });
          });
        }
      }

      function deleteShopping(id) {
        callApi('deleteShopping', { id: id }).then(() => {
          setShoppingList(shoppingList.filter(i => i.id !== id));
        });
      }

      function handlePhotoUpload(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          setShoppingForm({
            ...shoppingForm,
            photo: event.target.result
          });
        };
        reader.readAsDataURL(file);
      }

      function updateMinStock(itemId, newMin) {
        setItems(items.map(i =>
          i.id === itemId ? { ...i, minStock: parseInt(newMin) || 0 } : i
        ));
      }

      return (
        <div className="app">
          <div className="phone">
            <div className="header">
              <button className="hamburger" onClick={() => setMobileMenuOpen(true)}>☰</button>
              <h2 style={{ margin: 0, fontSize: '18px' }}>Shopping Manager</h2>
              <div style={{ width: 40 }}></div>
            </div>

            <div className={`mobile-nav ${mobileMenuOpen ? 'open' : ''}`} onClick={() => setMobileMenuOpen(false)}></div>
            <div className={`mobile-menu ${mobileMenuOpen ? 'open' : ''}`}>
              <button className="mobile-menu-close" onClick={() => setMobileMenuOpen(false)}>✕</button>
              {[['dashboard', '📊 Dashboard'], ['shopping', '🛒 Shopping'], ['members', '👥 Members']].map(([key, label]) => (
                <button key={key} className={`mobile-menu-item ${tab === key ? 'active' : ''}`} onClick={() => { setTab(key); setMobileMenuOpen(false); }}>
                  {label}
                </button>
              ))}
            </div>

            <section className="hero">
              <div>
                <p className="sub">Smart Household Shopping</p>
                <h1>Shared Shopping List</h1>
                <p className="sub">Track, buy, and manage stock together.</p>
              </div>
              <div className="badge">Real-time Sync</div>
            </section>

            <section className="grid metrics">
              <MetricCard label="Stock Value" value={formatCurrency(metrics.totalInventoryValue)} icon="💰" />
              <MetricCard label="Empty Items" value={metrics.emptyItems} icon="🚨" />
              <MetricCard label="Low Stock" value={metrics.lowStockItems} icon="⚠️" />
              <MetricCard label="Completion" value={`${metrics.completionRate}%`} icon="✅" />
            </section>

            <div className="tabs">
              {[['dashboard', 'Dashboard'], ['shopping', 'Shopping'], ['members', 'Members']].map(([key, label]) => (
                <button key={key} className={`tab-btn ${tab === key ? 'active' : ''}`} onClick={() => setTab(key)}>
                  {label}
                </button>
              ))}
            </div>

            <div className="bottom-nav">
              {[['dashboard', '📊'], ['shopping', '🛒'], ['members', '👥']].map(([key, icon]) => (
                <button key={key} className={`tab-btn ${tab === key ? 'active' : ''}`} onClick={() => setTab(key)} style={{ fontSize: '18px' }}>
                  {icon}
                </button>
              ))}
            </div>

            {tab === 'dashboard' && (
              <section className="tab-panel active">
                <div className="card section">
                  <h3>Current Stock</h3>
                  <div className="desc">Items in household inventory</div>
                  <div className="list" style={{ marginTop: 16 }}>
                    {items.map(item => (
                      <div key={item.id} className={`card ${item.stock === 0 ? 'empty-item' : ''}`} style={{ padding: 14, borderColor: item.stock === 0 ? '#dc2626' : undefined }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                          <div style={{ flex: 1 }}>
                            <div className="title" style={{ color: item.stock === 0 ? '#991b1b' : 'inherit' }}>{item.name}</div>
                            <div className="small">Stock: <strong>{item.stock}</strong> | Min: 
                              <input 
                                type="number" 
                                value={item.minStock} 
                                onChange={(e) => updateMinStock(item.id, e.target.value)}
                                style={{ width: 40, marginLeft: 4, padding: 2, marginRight: 4 }}
                              />
                            </div>
                          </div>
                          <div style={{ textAlign: 'right' }}>
                            <div className="title">{formatCurrency(item.price)}</div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </section>
            )}

            {tab === 'shopping' && (
              <section className="tab-panel active">
                <div className="card section">
                  <div className="toolbar">
                    <div><h3>Shopping List</h3><div className="desc">Track items to buy</div></div>
                    <button className="btn" onClick={() => setShoppingFormOpen(!shoppingFormOpen)}>+ Add</button>
                  </div>
                  {shoppingFormOpen && (
                    <div className="form-card">
                      <input className="input" placeholder="Item name" value={shoppingForm.title} onChange={(e) => setShoppingForm({ ...shoppingForm, title: e.target.value })} />
                      <div className="row-2">
                        <select className="select" value={shoppingForm.priority} onChange={(e) => setShoppingForm({ ...shoppingForm, priority: e.target.value })}>
                          <option>High</option><option>Medium</option><option>Low</option>
                        </select>
                        <select className="select" value={shoppingForm.buyer} onChange={(e) => setShoppingForm({ ...shoppingForm, buyer: e.target.value })}>
                          {teamMembers.map(m => <option key={m}>{m}</option>)}
                        </select>
                      </div>
                      <input className="input" type="number" step="0.01" placeholder="Est. price" value={shoppingForm.estimatedPrice} onChange={(e) => setShoppingForm({ ...shoppingForm, estimatedPrice: e.target.value })} />
                      <div>
                        <label style={{ display: 'block', marginBottom: 8, cursor: 'pointer', fontSize: 12 }}>
                          <input 
                            type="file" 
                            accept="image/*" 
                            onChange={handlePhotoUpload}
                            style={{ cursor: 'pointer' }}
                          />
                          📸 Add Photo from Phone
                        </label>
                        {shoppingForm.photo && <img src={shoppingForm.photo} alt="preview" className="photo-preview" />}
                      </div>
                      <button className="btn" onClick={addShoppingItem}>Save Item</button>
                    </div>
                  )}
                  <div className="list">
                    {shoppingList.map(entry => (
                      <div key={entry.id} className={`shopping-item ${entry.stock === 0 ? 'empty-highlight' : ''}`} style={{ borderColor: entry.done ? '#ccc' : undefined }}>
                        <div className="shopping-left">
                          <div style={{ flex: 1, width: '100%' }}>
                            <div className={`title ${entry.done ? 'done-text' : ''}`}>{entry.title}</div>
                            <div className="chips">
                              <span className="chip">{entry.priority}</span>
                              <span className="chip dark">{entry.buyer}</span>
                              <span className="chip">{formatCurrency(entry.estimatedPrice)}</span>
                            </div>
                            {!entry.done && (
                              <div className="checkout-form">
                                <label style={{ fontSize: 12, color: '#6b7280' }}>Quantity bought:</label>
                                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                                  <input
                                    type="number"
                                    min="1"
                                    placeholder="Qty"
                                    className="input quantity-input"
                                    value={checkoutForm[entry.id] || ''}
                                    onChange={(e) => setCheckoutForm({ ...checkoutForm, [entry.id]: e.target.value })}
                                  />
                                  <button 
                                    className="btn" 
                                    style={{ flex: 1 }}
                                    onClick={() => completeShoppingItem(entry.id)}
                                  >
                                    Checkout
                                  </button>
                                </div>
                              </div>
                            )}
                            {entry.photo && <img src={entry.photo} alt="item" className="photo-preview" />}
                          </div>
                        </div>
                        <button className="delete" onClick={() => deleteShopping(entry.id)}>🗑️</button>
                      </div>
                    ))}
                  </div>
                </div>
              </section>
            )}

            {tab === 'members' && (
              <section className="tab-panel active">
                <div className="card section">
                  <h3>Household Members</h3>
                  <div className="desc">Manage who shares the shopping list</div>
                  <div style={{ marginTop: 16, display: 'grid', gap: 12 }}>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <input 
                        className="input" 
                        placeholder="Add new member" 
                        value={newMember} 
                        onChange={(e) => setNewMember(e.target.value)}
                        onKeyPress={(e) => e.key === 'Enter' && addMember()}
                      />
                      <button className="btn" onClick={addMember}>Add</button>
                    </div>
                    <div className="list">
                      {teamMembers.map(member => (
                        <div key={member} className="member-badge">
                          <span>{member}</span>
                          <button className="delete" onClick={() => removeMember(member)}>✕</button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </section>
            )}
          </div>
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
