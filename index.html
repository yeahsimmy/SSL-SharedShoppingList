<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Household Budget</title>
  <script src="https://unpkg.com/chart.js"></script>
  <style>
    :root{
      --bg:#f1f5ff;--card:#ffffff;--text:#111827;--muted:#6b7280;--border:#dbe4ff;
      --dark:#3730a3;--dark2:#7c3aed;--soft:#f8fafc;--ok:#dcfce7;--warn:#fef3c7;
      --danger:#fee2e2;--ok-text:#166534;--warn-text:#92400e;--danger-text:#991b1b;
      --shadow:0 14px 34px rgba(76, 29, 149, .15);--radius:24px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(circle at top right,#fdf4ff 0,#eef2ff 36%,#f1f5ff 100%);color:var(--text);}
    button,input,select{font:inherit}
    .app{max-width:1400px;margin:0 auto;padding:16px}
    .phone{background:linear-gradient(180deg,#ffffff 0,#f8faff 100%);border:1px solid var(--border);border-radius:32px;
      box-shadow:0 20px 60px rgba(76, 29, 149, .12);padding:14px;min-height:100vh;}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px}
    .hamburger{display:none;background:none;border:none;font-size:24px;cursor:pointer;padding:8px;margin:-8px -8px -8px 0}
    .header h1{margin:0;font-size:24px;flex:1}
    .header-info{font-size:12px;color:var(--muted);text-align:right}
    .hero{background:linear-gradient(135deg,var(--dark),var(--dark2));color:#fff;border-radius:26px;
      padding:20px;margin-bottom:20px;}
    .hero h2{margin:6px 0;font-size:24px}
    .hero p{margin:0;color:#cbd5e1;font-size:14px}
    .tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
    .tab-btn{border:none;background:#f8fafc;border-radius:14px;padding:12px;cursor:pointer;font-weight:600;
      border:1px solid var(--border);transition:all .2s}
    .tab-btn.active{background:linear-gradient(135deg,var(--dark),var(--dark2));color:#fff;border-color:transparent}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .grid{display:grid;gap:12px}
    .grid-2{grid-template-columns:1fr 1fr}
    .grid-3{grid-template-columns:repeat(3,1fr)}
    .grid-4{grid-template-columns:repeat(4,1fr)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:18px}
    .card.empty{border-color:#dc2626;background:#fee2e2}
    .card.warning{border-color:#f59e0b;background:#fef3c7}
    .kpi-card{padding:20px;background:linear-gradient(135deg,var(--dark),var(--dark2));
      color:#fff;border-radius:20px;text-align:center}
    .kpi-value{font-size:32px;font-weight:700;margin:8px 0}
    .kpi-label{font-size:12px;color:#cbd5e1}
    .section{padding:18px;border-radius:12px;background:var(--card);border:1px solid var(--border)}
    .section h3{margin:0 0 12px 0;font-size:16px;font-weight:600}
    .list{display:grid;gap:12px}
    .item{display:flex;justify-content:space-between;align-items:center;padding:12px;
      border:1px solid var(--border);border-radius:12px;gap:12px}
    .item.urgent{border-color:#dc2626;background:rgba(220,38,38,.05)}
    .item-left{flex:1;display:flex;gap:12px;align-items:center}
    .item-info{flex:1}
    .item-title{font-weight:600;font-size:14px}
    .item-meta{font-size:12px;color:var(--muted);margin-top:4px}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;
      background:#eef2ff;color:#4f46e5;margin-right:4px}
    .badge.urgent{background:#fee2e2;color:#991b1b}
    .badge.market{background:#dbeafe;color:#1e40af}
    .badge.drugstore{background:#dcfce7;color:#166534}
    .item-photo{width:46px;height:46px;border-radius:10px;object-fit:cover;border:1px solid var(--border);cursor:pointer}
    .photo-placeholder{width:46px;height:46px;border-radius:10px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:12px}
    .member-actions{display:flex;gap:8px;align-items:center}
    .image-viewer{position:fixed;inset:0;background:rgba(15,23,42,.88);display:flex;align-items:center;justify-content:center;z-index:9999;padding:14px}
    .image-viewer img{max-width:100%;max-height:100%;border-radius:14px}
    .image-viewer-close{position:fixed;top:12px;right:12px;border:none;background:#fff;color:#0f172a;border-radius:999px;padding:8px 12px;cursor:pointer;font-weight:700}
    .input,.select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:12px;
      background:#fff}
    .input:focus,.select:focus{outline:none;border-color:var(--dark)}
    .btn{border:none;background:linear-gradient(135deg,var(--dark),var(--dark2));color:#fff;padding:10px 16px;border-radius:12px;
      cursor:pointer;font-weight:600;transition:background .2s}
    .btn:hover{opacity:.92}
    .btn.secondary{background:#e2e8f0;color:var(--text)}
    .btn.secondary:hover{background:#cbd5e1}
    .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
    .chart-container{position:relative;height:300px;margin-top:16px}
    .summary-row{display:flex;justify-content:space-between;align-items:center;padding:12px;
      border-bottom:1px solid var(--border)}
    .summary-row:last-child{border-bottom:none}
    .summary-label{font-size:14px}
    .summary-value{font-size:14px;font-weight:600}
    .filter-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .chip{padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:#fff;
      cursor:pointer;font-size:12px;transition:all .2s}
    .chip.active{background:var(--dark);color:#fff;border-color:var(--dark)}
    
    @media (max-width:768px){
      .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
      .tabs{grid-template-columns:repeat(3,1fr)}
      .hamburger{display:block}
      .header{flex-wrap:wrap}
      .item{flex-direction:column;align-items:flex-start}
      .kpi-value{font-size:24px}
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const API_URL = "https://script.google.com/macros/s/AKfycbyXq05L594ZlpeuFuuTvf85PrZgOC7qXU2AcG-yjxaQAjZtGwM2NKtIz4DWbhLql0VfVg/exec";

    const initialData = {
      teamMembers: [],
      budget: { total: 500, currency: "EUR", month: new Date().toLocaleString('default', { month: 'long', year: 'numeric' }) },
      shoppingList: [],
      completed: []
    };

    function parseBool(value) {
      return value === true || value === "true" || value === 1 || value === "1";
    }

    function normalizeData(rawData) {
      return {
        teamMembers: Array.isArray(rawData?.teamMembers) && rawData.teamMembers.length ? rawData.teamMembers : initialData.teamMembers,
        budget: rawData?.budget || initialData.budget,
        shoppingList: (rawData?.shoppingList || []).map(item => ({
          ...item,
          id: Number(item.id) || Date.now(),
          price: Number(item.price) || 0,
          done: parseBool(item.done),
          isFavorite: parseBool(item.isFavorite),
          recurring: parseBool(item.recurring),
          photo: item.photo || ""
        })),
        completed: (rawData?.completed || []).map(item => ({
          ...item,
          id: Number(item.id) || Date.now(),
          price: Number(item.price) || 0
        }))
      };
    }

    async function callApi(action, data = {}) {
      try {
        const response = await fetch(`${API_URL}?action=${encodeURIComponent(action)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(data)
        });
        return await response.json();
      } catch (err) {
        console.error('API error:', err);
        return { success: false };
      }
    }

    function SpendingChart({ data }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        
        const spending = {};
        data.forEach(item => {
          if (item.paidBy) {
            spending[item.paidBy] = (spending[item.paidBy] || 0) + item.price;
          }
        });

        if (chartRef.current) chartRef.current.destroy();

        chartRef.current = new Chart(canvasRef.current, {
          type: 'bar',
          data: {
            labels: Object.keys(spending),
            datasets: [{
              label: 'Total Spent',
              data: Object.values(spending),
              backgroundColor: ['#0f172a', '#334155', '#64748b'],
              borderRadius: 8
            }]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
      }, [data]);

      return <canvas ref={canvasRef}></canvas>;
    }

    function App() {
      const [tab, setTab] = useState('dashboard');
      const [data, setData] = useState(initialData);
      const [newItem, setNewItem] = useState({ title: '', price: '', buyer: '', category: 'market', priority: 'normal', photo: '' });
      const [filterChip, setFilterChip] = useState('all');
      const [newMemberName, setNewMemberName] = useState('');
      const [previewImage, setPreviewImage] = useState('');
      const [isLoading, setIsLoading] = useState(true);

      useEffect(() => {
        callApi('getData', {}).then(res => {
          if (res.success && res.data) {
            setData(normalizeData(res.data));
          }
        }).finally(() => setIsLoading(false));
      }, []);

      useEffect(() => {
        if (!data.teamMembers.length) return;
        setNewItem(prev => ({ ...prev, buyer: prev.buyer || data.teamMembers[0] }));
      }, [data.teamMembers]);

      const spending = useMemo(() => {
        const totals = {};
        data.completed.forEach(item => {
          if (item.paidBy) totals[item.paidBy] = (totals[item.paidBy] || 0) + item.price;
        });
        return totals;
      }, [data.completed]);

      const remainingBudget = useMemo(() => {
        const spent = Object.values(spending).reduce((a, b) => a + b, 0);
        return data.budget.total - spent;
      }, [spending, data.budget.total]);

      const filteredList = useMemo(() => {
        let list = data.shoppingList;
        if (filterChip === 'urgent') list = list.filter(i => i.priority === 'urgent');
        if (filterChip === 'today') list = list.filter(i => new Date(i.date).toDateString() === new Date().toDateString());
        if (filterChip === 'market') list = list.filter(i => i.category === 'market');
        if (filterChip === 'drugstore') list = list.filter(i => i.category === 'drugstore');
        if (filterChip === 'favorites') list = list.filter(i => i.isFavorite);
        return list.filter(i => !i.done);
      }, [data.shoppingList, filterChip]);

      function addShoppingItem() {
        if (!newItem.title.trim() || !newItem.price || !newItem.buyer) return;
        const item = {
          id: Date.now(),
          title: newItem.title,
          price: parseFloat(newItem.price),
          buyer: newItem.buyer,
          category: newItem.category,
          priority: newItem.priority,
          done: false,
          paidBy: null,
          addedBy: 'Yesim',
          date: new Date().toISOString(),
          isFavorite: false,
          recurring: false,
          photo: newItem.photo || ""
        };
        callApi('addShoppingItem', item).then((res) => {
          if (!res.success) return;
          setData({ ...data, shoppingList: [...data.shoppingList, item] });
          setNewItem({ title: '', price: '', buyer: data.teamMembers[0] || 'Yesim', category: 'market', priority: 'normal', photo: '' });
        });
      }

      function completeItem(id, quantity = 1) {
        const item = data.shoppingList.find(i => i.id === id);
        if (!item) return;
        const completed = {
          ...item,
          quantity,
          done: true,
          date: new Date().toISOString(),
          paidBy: item.buyer
        };
        callApi('completeItem', completed).then(() => {
          setData({
            ...data,
            shoppingList: data.shoppingList.filter(i => i.id !== id),
            completed: [completed, ...data.completed]
          });
        });
      }

      function deleteItem(id) {
        callApi('deleteItem', { id }).then(() => {
          setData({ ...data, shoppingList: data.shoppingList.filter(i => i.id !== id) });
        });
      }

      function toggleFavorite(id) {
        setData({
          ...data,
          shoppingList: data.shoppingList.map(i => 
            i.id === id ? { ...i, isFavorite: !i.isFavorite } : i
          )
        });
      }

      function editItem(id) {
        const existing = data.shoppingList.find(i => i.id === id);
        if (!existing) return;
        const title = prompt('Item name', existing.title);
        if (!title || !title.trim()) return;
        const priceInput = prompt('Price', String(existing.price));
        if (priceInput === null) return;
        const price = Number(priceInput);
        if (!Number.isFinite(price) || price < 0) return;
        const updated = { ...existing, title: title.trim(), price };
        callApi('updateShoppingItem', updated).then((res) => {
          if (!res.success) return;
          setData({
            ...data,
            shoppingList: data.shoppingList.map(i => i.id === id ? updated : i)
          });
        });
      }

      function addMember() {
        const value = newMemberName.trim();
        if (!value || data.teamMembers.includes(value)) return;
        callApi('addMember', { member: value }).then((res) => {
          if (!res.success) return;
          setData({ ...data, teamMembers: [...data.teamMembers, value] });
          setNewMemberName('');
        });
      }

      function renameMember(oldName) {
        const next = prompt('Rename member', oldName);
        if (!next || !next.trim() || next.trim() === oldName) return;
        const newName = next.trim();
        callApi('renameMember', { oldName, newName }).then((res) => {
          if (!res.success) return;
          setData({
            ...data,
            teamMembers: data.teamMembers.map(m => m === oldName ? newName : m),
            shoppingList: data.shoppingList.map(i => i.buyer === oldName ? { ...i, buyer: newName } : i),
            completed: data.completed.map(i => ({
              ...i,
              buyer: i.buyer === oldName ? newName : i.buyer,
              paidBy: i.paidBy === oldName ? newName : i.paidBy
            }))
          });
        });
      }

      function removeMember(name) {
        if (!confirm(`Delete member "${name}"?`)) return;
        callApi('removeMember', { member: name }).then((res) => {
          if (!res.success) return;
          const fallback = data.teamMembers.find(m => m !== name) || "Unassigned";
          setData({
            ...data,
            teamMembers: data.teamMembers.filter(m => m !== name),
            shoppingList: data.shoppingList.map(i => i.buyer === name ? { ...i, buyer: fallback } : i),
            completed: data.completed.map(i => ({
              ...i,
              buyer: i.buyer === name ? fallback : i.buyer,
              paidBy: i.paidBy === name ? fallback : i.paidBy
            }))
          });
        });
      }

      function resizeImage(base64, maxSize = 900, quality = 0.6) {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width > maxSize || height > maxSize) {
              const ratio = Math.min(maxSize / width, maxSize / height);
              width = Math.round(width * ratio);
              height = Math.round(height * ratio);
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = () => resolve(base64);
          img.src = base64;
        });
      }

      async function processImageForSheet(base64) {
        // Google Sheets cells are limited; keep base64 safely below that.
        let result = await resizeImage(base64, 900, 0.6);
        if (result.length <= 45000) return result;
        result = await resizeImage(base64, 700, 0.45);
        if (result.length <= 45000) return result;
        result = await resizeImage(base64, 520, 0.35);
        if (result.length <= 45000) return result;
        return result.slice(0, 45000);
      }

      function uploadPhoto(file, itemId = null) {
        const reader = new FileReader();
        reader.onload = async () => {
          const original = String(reader.result || '');
          const photo = await processImageForSheet(original);
          if (itemId === null) {
            setNewItem(prev => ({ ...prev, photo }));
            return;
          }
          const updated = data.shoppingList.find(i => i.id === itemId);
          if (!updated) return;
          const nextItem = { ...updated, photo };
          callApi('updateShoppingItem', nextItem).then((res) => {
            if (!res.success) {
              alert('Image upload failed. Please try a smaller photo.');
              return;
            }
            setData({
              ...data,
              shoppingList: data.shoppingList.map(i => i.id === itemId ? nextItem : i)
            });
          });
        };
        reader.onerror = () => alert('Image could not be read on this device.');
        reader.readAsDataURL(file);
      }

      return (
        <div className="app">
          <div className="phone">
            <div className="header">
              <button className="hamburger">☰</button>
              <h1>Smart Household</h1>
              <div className="header-info">
                <div>{data.budget.currency} {remainingBudget.toFixed(2)}</div>
                <div style={{fontSize: 10, color: '#6b7280'}}>remaining</div>
              </div>
            </div>

            <div className="hero">
              <h2>Monthly Budget Overview</h2>
              <p>{data.budget.month} • Total: €{data.budget.total}</p>
            </div>

            <div className="tabs">
              {['dashboard', 'shopping', 'history', 'budget', 'members', 'summary'].map(t => (
                <button key={t} className={`tab-btn ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>
                  {t.charAt(0).toUpperCase() + t.slice(1)}
                </button>
              ))}
            </div>
            {isLoading && (
              <div className="section" style={{ marginBottom: 16 }}>
                <h3>Loading data...</h3>
              </div>
            )}

            {!isLoading && tab === 'dashboard' && (
              <div className="tab-panel active">
                <div className="grid grid-4">
                  <div className="kpi-card">
                    <div className="kpi-label">Remaining Budget</div>
                    <div className="kpi-value" style={{color: remainingBudget < 0 ? '#dc2626' : '#10b981'}}>€{remainingBudget.toFixed(2)}</div>
                  </div>
                  <div className="kpi-card">
                    <div className="kpi-label">Total Spent</div>
                    <div className="kpi-value">€{Object.values(spending).reduce((a,b) => a+b, 0).toFixed(2)}</div>
                  </div>
                  <div className="kpi-card">
                    <div className="kpi-label">Open Items</div>
                    <div className="kpi-value">{data.shoppingList.filter(i => !i.done).length}</div>
                  </div>
                  <div className="kpi-card">
                    <div className="kpi-label">Low Stock Items</div>
                    <div className="kpi-value">{Math.max(0, data.shoppingList.filter(i => i.priority === 'urgent').length)}</div>
                  </div>
                </div>

                <div className="grid grid-2" style={{marginTop: 20}}>
                  <div className="section">
                    <h3>Spending by Participant</h3>
                    <div className="chart-container">
                      <SpendingChart data={data.completed} />
                    </div>
                  </div>

                  <div className="section">
                    <h3>Quick Stats</h3>
                    {Object.entries(spending).map(([person, total]) => (
                      <div key={person} className="summary-row">
                        <span className="summary-label">{person}</span>
                        <span className="summary-value">€{total.toFixed(2)}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="section" style={{marginTop: 20}}>
                  <h3>🚨 Urgent Items ({data.shoppingList.filter(i => i.priority === 'urgent').length})</h3>
                  <div className="list">
                    {data.shoppingList.filter(i => i.priority === 'urgent' && !i.done).slice(0, 5).map(item => (
                      <div key={item.id} className="item urgent">
                        <div className="item-left">
                          <div className="item-info">
                            <div className="item-title">{item.title}</div>
                            <div className="item-meta">€{item.price} • {item.buyer}</div>
                          </div>
                        </div>
                        <div>€{item.price}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="section" style={{marginTop: 20}}>
                  <h3>📋 Still Open ({data.shoppingList.filter(i => !i.done).length})</h3>
                  <div className="list" style={{maxHeight: 300, overflowY: 'auto'}}>
                    {data.shoppingList.filter(i => !i.done).slice(0, 10).map(item => (
                      <div key={item.id} className="item">
                        <div className="item-left">
                          <div className="item-info">
                            <div className="item-title">{item.title}</div>
                            <div className="item-meta">€{item.price} • {item.buyer}</div>
                          </div>
                        </div>
                        <div>€{item.price}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {!isLoading && tab === 'shopping' && (
              <div className="tab-panel active">
                <div className="section">
                  <h3>Add New Item</h3>
                  <div className="grid grid-2" style={{gap: 12, marginTop: 12}}>
                    <input className="input" placeholder="Item name" value={newItem.title} onChange={(e) => setNewItem({...newItem, title: e.target.value})} />
                    <input className="input" type="number" placeholder="Price" value={newItem.price} onChange={(e) => setNewItem({...newItem, price: e.target.value})} />
                    <select className="select" value={newItem.buyer} onChange={(e) => setNewItem({...newItem, buyer: e.target.value})}>
                      {data.teamMembers.map(m => <option key={m}>{m}</option>)}
                    </select>
                    <select className="select" value={newItem.category} onChange={(e) => setNewItem({...newItem, category: e.target.value})}>
                      <option value="market">Market</option>
                      <option value="drugstore">Drugstore</option>
                      <option value="other">Other</option>
                    </select>
                    <select className="select" style={{gridColumn: 'span 2'}} value={newItem.priority} onChange={(e) => setNewItem({...newItem, priority: e.target.value})}>
                      <option value="normal">Normal</option>
                      <option value="urgent">Urgent</option>
                      <option value="today">Today</option>
                    </select>
                    <input className="input" style={{gridColumn: 'span 2'}} type="file" accept="image/*" capture="environment" onChange={(e) => e.target.files?.[0] && uploadPhoto(e.target.files[0])} />
                    {newItem.photo && (
                      <div style={{gridColumn: 'span 2'}}>
                        <img src={newItem.photo} alt="Preview" className="item-photo" onClick={() => setPreviewImage(newItem.photo)} onTouchEnd={() => setPreviewImage(newItem.photo)} />
                      </div>
                    )}
                  </div>
                  <button className="btn" style={{width: '100%', marginTop: 12}} onClick={addShoppingItem}>Add Item</button>
                </div>

                <div className="section" style={{marginTop: 20}}>
                  <h3>Shopping List</h3>
                  <div className="filter-chips">
                    {['all', 'urgent', 'today', 'market', 'drugstore', 'favorites'].map(f => (
                      <button key={f} className={`chip ${filterChip === f ? 'active' : ''}`} onClick={() => setFilterChip(f)}>
                        {f.charAt(0).toUpperCase() + f.slice(1)}
                      </button>
                    ))}
                  </div>
                  <div className="list">
                    {filteredList.map(item => (
                      <div key={item.id} className={`item ${item.priority === 'urgent' ? 'urgent' : ''}`}>
                        <div className="item-left">
                          {item.photo ? <img src={item.photo} alt={item.title} className="item-photo" onClick={() => setPreviewImage(item.photo)} onTouchEnd={() => setPreviewImage(item.photo)} /> : <div className="photo-placeholder">IMG</div>}
                          <input type="checkbox" onChange={() => completeItem(item.id)} />
                          <div className="item-info">
                            <div className="item-title">{item.title}{item.isFavorite ? ' ⭐' : ''}</div>
                            <div style={{display: 'flex', gap: 4, marginTop: 4}}>
                              <span className={`badge ${item.priority === 'urgent' ? 'urgent' : ''}`}>{item.priority}</span>
                              <span className={`badge ${item.category}`}>{item.category}</span>
                              <span className="badge">{item.buyer}</span>
                            </div>
                          </div>
                        </div>
                        <div style={{display: 'flex', gap: 8, alignItems: 'center'}}>
                          <strong>€{item.price}</strong>
                          <label className="btn secondary" style={{padding: '4px 8px', fontSize: 12, cursor: 'pointer'}}>
                            📷
                            <input type="file" accept="image/*" capture="environment" style={{display: 'none'}} onChange={(e) => e.target.files?.[0] && uploadPhoto(e.target.files[0], item.id)} />
                          </label>
                          <button className="btn secondary" style={{padding: '4px 8px', fontSize: 12}} onClick={() => editItem(item.id)}>✏️</button>
                          <button className="btn secondary" style={{padding: '4px 8px', fontSize: 12}} onClick={() => toggleFavorite(item.id)}>⭐</button>
                          <button className="btn secondary" style={{padding: '4px 8px', fontSize: 12}} onClick={() => deleteItem(item.id)}>🗑️</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {!isLoading && tab === 'history' && (
              <div className="tab-panel active">
                <div className="section">
                  <h3>Completed Purchases</h3>
                  <div className="list">
                    {data.completed.map(item => (
                      <div key={item.id} className="item">
                        <div className="item-left">
                          <div className="item-info">
                            <div className="item-title">{item.title}</div>
                            <div className="item-meta">Paid by {item.paidBy} on {new Date(item.date).toLocaleDateString()}</div>
                          </div>
                        </div>
                        <div><strong>€{item.price}</strong></div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {!isLoading && tab === 'budget' && (
              <div className="tab-panel active">
                <div className="section">
                  <h3>Budget Status</h3>
                  <div className="summary-row">
                    <span>Total Budget</span>
                    <span className="summary-value">€{data.budget.total}</span>
                  </div>
                  <div className="summary-row">
                    <span>Total Spent</span>
                    <span className="summary-value">€{Object.values(spending).reduce((a,b) => a+b, 0).toFixed(2)}</span>
                  </div>
                  <div className="summary-row" style={{background: remainingBudget < 0 ? '#fee2e2' : '#dcfce7', borderRadius: 8, padding: 12, marginTop: 12}}>
                    <span style={{fontWeight: 600}}>Remaining</span>
                    <span className="summary-value" style={{color: remainingBudget < 0 ? '#991b1b' : '#166534'}}>€{remainingBudget.toFixed(2)}</span>
                  </div>
                </div>

                <div className="section" style={{marginTop: 20}}>
                  <h3>Spending Breakdown</h3>
                  {Object.entries(spending).map(([person, total]) => (
                    <div key={person} className="summary-row">
                      <span>{person}</span>
                      <span className="summary-value">€{total.toFixed(2)} ({((total / data.budget.total) * 100).toFixed(0)}%)</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {!isLoading && tab === 'members' && (
              <div className="tab-panel active">
                <div className="section">
                  <h3>Team Members</h3>
                  <div className="toolbar">
                    <input className="input" placeholder="Add member name" value={newMemberName} onChange={(e) => setNewMemberName(e.target.value)} />
                    <button className="btn" onClick={addMember}>Add</button>
                  </div>
                  <div className="list">
                    {data.teamMembers.map(member => (
                      <div key={member} className="item">
                        <div className="item-info">
                          <div className="item-title">{member}</div>
                          <div className="item-meta">Spent: €{(spending[member] || 0).toFixed(2)}</div>
                        </div>
                        <div className="member-actions">
                          <button className="btn secondary" style={{padding: '4px 8px', fontSize: 12}} onClick={() => renameMember(member)}>Rename</button>
                          <button className="btn secondary" style={{padding: '4px 8px', fontSize: 12}} onClick={() => removeMember(member)}>Delete</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {!isLoading && tab === 'summary' && (
              <div className="tab-panel active">
                <div className="section">
                  <h3>Monthly Summary</h3>
                  <div className="summary-row">
                    <span>Month</span>
                    <span className="summary-value">{data.budget.month}</span>
                  </div>
                  <div className="summary-row">
                    <span>Total Budget</span>
                    <span className="summary-value">€{data.budget.total}</span>
                  </div>
                  <div className="summary-row">
                    <span>Total Spent</span>
                    <span className="summary-value">€{Object.values(spending).reduce((a,b) => a+b, 0).toFixed(2)}</span>
                  </div>
                  <div className="summary-row">
                    <span>Completed Items</span>
                    <span className="summary-value">{data.completed.length}</span>
                  </div>
                  <div className="summary-row">
                    <span>Open Items</span>
                    <span className="summary-value">{data.shoppingList.filter(i => !i.done).length}</span>
                  </div>
                </div>
              </div>
            )}
          </div>
          {previewImage && (
            <div className="image-viewer" onClick={() => setPreviewImage('')}>
              <button className="image-viewer-close" onClick={() => setPreviewImage('')}>X</button>
              <img src={previewImage} alt="Full size" onClick={(e) => e.stopPropagation()} />
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
